<!DOCTYPE html>
<html lang="en">

<head resource>
    <meta charset="UTF-8">
    <include file="../inc/meta.inc" />
    <title>固定试卷</title>
</head>

<body>
    <div id="vapp" v-cloak>
        <section class="left">
            <el-card shadow="never" type="primary" class="theme">
                <template slot="header">
                    <span icon="&#xe72f" medium>基本信息</span>
                </template>
                <p class="tpname">
                    <span v-if="entity.Etp_Name==''" class="null">(未命名试卷)</span>
                    <template v-else>{{entity.Etp_Name}}</template>
                </p>
                <p class="tpsubname">
                    <span v-if="entity.Etp_SubName==''" class="null">(未编写副标题)</span>
                    <template v-else>{{entity.Etp_SubName}}</template>
                <div class="tpinfo">
                    <span>考试时间 {{entity.Etp_Span}} 分钟</span>
                    <span>满分 {{entity.Etp_Total}} 分</span>
                    <span> {{entity.Etp_PassScore}} 分 及格</span>
                </div>
                <div class="tpremind">
                    注意事项:<br />
                    <span v-if="entity.Etp_Remind==''" class="null">(未编写注意事项)</span>
                    <span v-else v-html="entity.Etp_Remind"></span>
                </div>
            </el-card>
            <section class="content">

            </section>
        </section>
        <section class="right">
            <el-form ref="form" :model="entity" :rules="rules" @submit.native.prevent
                label-width="100px">
                <el-card shadow="never" type="primary">
                    <template slot="header">
                        <span icon="&#xe829" huge>卷面信息</span>
                    </template>
                    <el-form-item label="" prop="Etp_Total" label-width="0">
                        <el-input v-model="entity.Etp_Total" type="number" :min="1">
                            <template slot="prepend">满分</template>
                            <template slot="append">分</template>
                        </el-input>
                    </el-form-item>
                    <el-form-item label="" prop="Etp_PassScore" label-width="0">
                        <el-input v-model="entity.Etp_PassScore" type="number" :min="0" :max="entity.Etp_Total">
                            <template slot="prepend">及格</template>
                            <template slot="append">分</template>
                        </el-input>
                    </el-form-item>
                    <el-form-item label="难度范围" prop="Etp_Diff">
                        <el-row :gutter="20">
                            <el-col :span="12">
                                <el-slider v-model="Etp_Diff" :step="1" range show-stops :min="1" :max="5"
                                    @change="arr=>{entity.Etp_Diff=arr[0];entity.Etp_Diff2=arr[1];}">
                                </el-slider>
                            </el-col>
                            <el-col :span="10">
                                <el-tag type="info">{{entity.Etp_Diff}} - {{entity.Etp_Diff2}}</el-tag>
                            </el-col>
                        </el-row>
                    </el-form-item>
                    <el-form-item label="时长" prop="Etp_Span">
                        <el-input placeholder="请输入内容" v-model.trim="entity.Etp_Span" type="number" style="width: 300px;">
                            <template slot="prepend">限时</template>
                            <template slot="append">分钟</template>
                        </el-input>
                    </el-form-item>
                    <el-form-item label="">
                        <el-switch v-model="entity.Etp_IsUse" active-color="#13ce66" active-text="启用">
                        </el-switch>
                        <el-switch v-model="entity.Etp_IsRec" active-color="#13ce66" active-text="推荐">
                        </el-switch>
                    </el-form-item>
                </el-card>
                <el-card shadow="never" type="primary">
                    <template slot="header">
                        <span icon="&#xe75e" medium>题卡</span>

                    </template>

                </el-card>
            </el-form>
        </section>
    </div>
</body>

</html>
