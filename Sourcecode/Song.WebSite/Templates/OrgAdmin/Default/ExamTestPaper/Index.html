<!DOCTYPE html>
<html lang="en">

<head resource>
    <meta charset="UTF-8">
    <include file="../inc/meta.inc" />
    <title>考试试卷</title>
</head>

<body>
    <div id="vapp" v-cloak>
        <div class="toolsbar">
            <btngroup show="新增,修改,删除" ref='btngroup' :disabled="loading" :selects='selects' idkey='Etp_Id'
                table="datatables" path="Modify" width="900" height="500">
            </btngroup>
            <query_panel :model="form" :width="45" :loading="loading" @search="handleCurrentChange(1)">
                <template>
                    <el-form-item label="标题">
                        <el-input v-model.trim="form.search" clearable style="width:245px" placeholder="搜索试卷标题">
                        </el-input>
                    </el-form-item>
                </template>
                <template slot="more">
                    <el-form-item label="状态">
                        <!--是否试题有错误-->
                        <el-radio-group v-model="form.error">
                            <el-radio-button label="">所有</el-radio-button>
                            <el-radio-button label="false">
                                <icon>&#xe634</icon>正常
                            </el-radio-button>
                            <el-radio-button label="true">
                                <icon>&#xe70e</icon>存在错误
                            </el-radio-button>
                        </el-radio-group>
                    </el-form-item>

                </template>
            </query_panel>
        </div>
        <!-- 数据列表-->
        <el-table ref="datatables" border resizable :data="datas" tooltip-effect="dark" style="width: 100%" stripe
            @selection-change="val=>selects=val" @row-dblclick="rowdblclick" row-key="Etp_Id">
            <div slot="empty">
                <span v-if="!loading">未查询到数据</span>
            </div>
            <el-table-column type="selection" width="35">
            </el-table-column>
            <el-table-column label="#" type="index" width="60" align="center">
                <template slot-scope="scope">
                    <span>{{(form.index - 1) * form.size + scope.$index + 1}}</span>
                </template>
            </el-table-column>

            <el-table-column label="试卷">
                <template slot-scope="scope">
                    <useicon :state="scope.row.Etp_IsUse"> </useicon>
                    <span v-html="showsearch(scope.row.Etp_Name,form.search)" class="large"></span>
                    <br />
                    <el-tag type="info" title="难度等级"> {{scope.row.Etp_Diff}} - {{scope.row.Etp_Diff2}}</el-tag>
                    <el-tag type="info" title="题量"> {{scope.row.Etp_Count}} 道题</el-tag>

                    <el-tag type="primary" v-if="scope.row.Etp_IsFinal">
                        <icon>&#xe816</icon>结课考试
                    </el-tag>
                </template>
            </el-table-column>
            <el-table-column label="类型" align="center" width="120">
                <template slot-scope="scope">
                    <template v-if="scope.row.Etp_Type==1">
                        固定试题
                    </template>
                    <template v-if="scope.row.Etp_Type==2" remark="随机试题">
                        <div>
                            随机试题
                        </div>                       
                    </template>
                </template>
            </el-table-column>
            <el-table-column label="分数/限时" width="100">
                <template slot-scope="scope">
                    <div><span v-html="scope.row.Etp_PassScore" title="及格分"></span> /
                        <span v-html="scope.row.Etp_Total" title="满分"></span> 分
                    </div>
                    <div>
                        <icon>&#xe81a</icon> {{scope.row.Etp_Span}} 分钟
                    </div>
                </template>
            </el-table-column>

            <el-table-column label="操作" width="100">
                <template slot="header" slot-scope="scope">
                    <el-dropdown @command="batchState">
                        <span class="el-dropdown-link">
                            操作<i class="el-icon-arrow-down el-icon--right"></i>
                        </span>
                        <el-dropdown-menu slot="dropdown">
                            <el-dropdown-item :command="1">
                                <icon>&#xa030</icon>批量启用
                            </el-dropdown-item>
                            <el-dropdown-item :command="0">
                                <icon>&#xe7ad</icon>批量禁用
                            </el-dropdown-item>
                        </el-dropdown-menu>
                    </el-dropdown>
                </template>
                <template slot-scope="scope">
                    <div>
                        <el-link type="primary" plain @click="viewResults(scope.row)">
                            <icon>&#xe696</icon>成绩
                            <result_count :ref="'result_count_'+scope.$index" :tpid="scope.row.Etp_Id"
                                :index="scope.$index"></result_count>
                        </el-link>
                    </div>
                    <el-dropdown>
                        <span class="el-dropdown-link">
                            <icon>&#xa030</icon><span style="font-size: 12px">管理</span><i
                                class="el-icon-arrow-down el-icon--right"></i>
                        </span>
                        <el-dropdown-menu slot="dropdown">
                            <el-dropdown-item>
                                <el-switch v-model="scope.row.Etp_IsUse" @change="changeState(scope.row)"
                                    active-color="#13ce66" inactive-color="#ff4949" v-show="loadingid!=scope.row.Etp_Id"
                                    :active-text="scope.row.Etp_IsUse ? '启用' : '禁用'">

                                </el-switch>
                            </el-dropdown-item>
                            <el-dropdown-item divided>
                                <el-link type="primary" plain icon="el-icon-edit" @click='rowdblclick(scope.row)'>
                                    修改
                                </el-link>
                            </el-dropdown-item>
                            <el-dropdown-item>
                                <el-popconfirm confirm-button-text='是的' cancel-button-text='不用' icon="el-icon-info"
                                    icon-color="red" title="确定删除吗？" @confirm="$refs.btngroup.delete(scope.row.Etp_Id)">
                                    <el-link type="danger" plain icon="el-icon-delete" slot="reference">删除
                                    </el-link>
                                </el-popconfirm>
                            </el-dropdown-item>
                        </el-dropdown-menu>
                    </el-dropdown>
                </template>
            </el-table-column>
        </el-table>


        <div id="pager-box">
            <el-pagination v-on:current-change="handleCurrentChange" :current-page="form.index" :page-size="form.size"
                :pager-count="12" layout="total, prev, pager, next, jumper" :total="total">
            </el-pagination>
        </div>
    </div>
</body>

</html>
