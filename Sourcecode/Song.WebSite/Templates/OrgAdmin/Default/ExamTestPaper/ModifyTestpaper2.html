<!DOCTYPE html>
<html lang="en">

<head resource>
    <meta charset="UTF-8">
    <include file="../inc/meta.inc" />
    <title>随机试卷</title>
</head>

<body>
    <div id="vapp" v-cloak>
        <div class="panel">
            <el-tabs type="border-card" v-model="activeName">
                <el-tab-pane :name="tab.tab" v-for="(tab,i) in tabs">
                    <span slot="label">
                        <icon v-html="'&#x'+tab.icon"></icon> {{tab.name}}
                    </span>
                </el-tab-pane>
            </el-tabs>
            <el-form ref="form" :model="entity" :rules="rules" v-loading="loading" @submit.native.prevent
                label-width="100px">
                <div v-show="activeName=='general'" remark="基本信息" tab="general">
                    <el-form-item label="试卷标题" prop="Etp_Name">
                        <el-input v-model="entity.Etp_Name"></el-input>
                    </el-form-item>
                    <el-form-item label="副标题" prop="Etp_SubName">
                        <el-input v-model="entity.Etp_SubName"></el-input>
                    </el-form-item>
                    <el-form-item label="">
                        <el-switch v-model="entity.Etp_IsUse" active-color="#13ce66" active-text="启用">
                        </el-switch>
                        <el-switch v-model="entity.Etp_IsRec" active-color="#13ce66" active-text="推荐">
                        </el-switch>
                    </el-form-item>
                    <el-form-item label="难度范围" prop="Etp_Diff">
                        <el-row :gutter="20">
                            <el-col :span="12">
                                <el-slider v-model="Etp_Diff" :step="1" range show-stops :min="1" :max="5"
                                    @change="diffChange">
                                </el-slider>
                            </el-col>
                            <el-col :span="10">
                                <el-tag type="info">{{entity.Etp_Diff}} - {{entity.Etp_Diff2}}</el-tag>
                            </el-col>
                        </el-row>
                    </el-form-item>
                    <el-form-item label="时长" prop="Etp_Span">
                        <el-input placeholder="请输入内容" v-model="entity.Etp_Span" type="number" style="width: 300px;">
                            <template slot="prepend">限时</template>
                            <template slot="append">分钟</template>
                        </el-input>
                    </el-form-item>
                    <el-form-item label="简介" prop="Etp_Intro">
                        <editor :content="entity.Etp_Intro" id="intro" :menubar="false" model="general"
                            class="intro_editor" upload="TestPaper" :dataid="entity.Etp_Id"
                            @change="text=>entity.Etp_Intro=text"></editor>
                    </el-form-item>

                </div>
                <div v-show="activeName=='range'" remark="出题范围" tab="range">
                    <section class="range">
                        <el-card shadow="never">
                            <template slot="header">
                                <span icon="&#xa015" large>试题分类</span>
                                <el-tag type="warning" v-if="parts?.length>0">
                                    选中 {{parts.length}} 分类，共 {{parts.reduce((total, item) => total + item.QuesCount,0)}}
                                    道试题
                                </el-tag>
                                <el-button type="primary" plain @click="opensubwin('SelectParts','按“试题分类”抽题','a015')">选择
                                </el-button>
                            </template>
                            <icon null size="large" v-if="parts?.length<1">没有选择任何试题分类</icon>
                            <el-tag v-else v-for="(p,i) in parts" :key="p.Qp_ID" closable type="info"
                                @close="tag=>parts.splice(i,1)"> {{p.Qp_Name}} </el-tag>

                        </el-card>
                        <el-card shadow="never">
                            <template slot="header">
                                <span icon="&#xe841" large>关键字</span>
                                <el-tag type="warning" v-if="tags?.length>0">
                                    选中 {{tags.length}} 个关键字，共 {{tags.reduce((total, item) => total + item.Qtag_Count,0)}}
                                    道试题
                                </el-tag>
                                <el-button type="primary" plain @click="opensubwin('SelectTag','按“关键字”抽题','e841')">选择
                                </el-button>
                            </template>
                            <icon null size="large" v-if="tags?.length<1">没有选择任何关键字</icon>
                            <el-tag v-else v-for="(p,i) in tags" :key="p.Qtag_ID" closable type="info"
                                @close="tag=>tags.splice(i,1)"> {{p.Qtag_Name}} </el-tag>
                        </el-card>
                        <el-card shadow="never">
                            <template slot="header">
                                <span icon="&#xe6fd" large>关联知识点</span>
                                <el-tag type="warning" v-if="knls?.length>0">
                                    选中 {{knls.length}} 个知识点，共 {{knls.reduce((total, item) => total + item.QuesCount,0)}}
                                    道试题
                                </el-tag>
                                <el-button type="primary" plain @click="opensubwin('SelectKnl','按“关联知识点”抽题','e6fd')">选择
                                </el-button>
                            </template>
                            <icon null size="large" v-if="knls?.length<1">没有选择任何知识点</icon>
                            <el-tag v-else v-for="(p,i) in knls" :key="p.Qk_ID"  type="info" closable @close="tag=>knls.splice(i,1)">
                                {{p.Qk_Name}} </el-tag>
                        </el-card>
                    </section>
                    <el-card shadow="never" type="primary" class="qtype_card">
                        <template slot="header">
                            <span icon="&#xe75e" large>供选择的题量</span>
                            <span>{{ questotal}} 道</span>
                        </template>                       
                        <loading v-if="loadstate.init">加载中...</loading>
                        <el-row :gutter="20" v-else v-for="(v,k,idx) in quescount">
                            <ques_type :type="idx+1" :types="types" :showicon="true" :showname="true">
                                <span :zero="v<1">{{v}} 道</span>
                            </ques_type>
                        </el-row>
                    </el-card>
                </div>
                <div v-show="activeName=='score'" remark="分数" tab="score">
                    <el-form-item label="分数" prop="Etp_Total">
                        <el-input v-model="entity.Etp_Total" type="number" :min="1" style="width: 300px;">
                            <template slot="prepend">试卷满分</template>
                            <template slot="append">分</template>
                        </el-input>
                    </el-form-item>

                    <el-form-item label="" prop="Etp_PassScore">
                        <el-input v-model="entity.Etp_PassScore" type="number" :min="0" style="width: 300px;">
                            <template slot="prepend">及格分数</template>
                            <template slot="append">分</template>
                        </el-input>
                    </el-form-item>
                </div>
                <div v-show="activeName=='remind'" remark="注意事项" class="intro_editor" tab="remind">
                    <editor :content="entity.Etp_Remind" id="remind" :menubar="false" model="general" upload="TestPaper"
                        :dataid="entity.Etp_Id" @change="text=>entity.Etp_Remind=text"></editor>
                </div>
                <div v-show="activeName=='other'" remark="其它" tab="other">
                    <el-form-item label="出卷人">
                        <el-input v-model="entity.Etp_Author" style="width: 180px;"></el-input>
                    </el-form-item>
                    <el-form-item label="试卷Logo">
                        <div class="img_tools">
                            <upload-img @change="f=>upfile=f" :data="entity" size="1024" height="30" ext="jpg,png,gif">
                                <el-tooltip content="允许的图片格式：jpg,png,gif" placement="right" effect="light">
                                    <span style="cursor: pointer;">
                                        <icon>&#xe6ea</icon>点击上传图片
                                    </span>
                                </el-tooltip>
                            </upload-img>
                            <template v-if="entity.Etp_Logo!='' || upfile!=null">
                                <el-link type="primary" @click.stop="()=>{upfile=null;entity.Etp_Logo = '';}">清除图片
                                </el-link>
                            </template>
                        </div>
                        <div v-if="entity.Etp_Logo!='' || upfile!=null" class="img_div">
                            <img v-if="upfile!=null" :src="upfile.base64" />
                            <img v-else :src="entity.Etp_Logo" />
                        </div>
                    </el-form-item>
                </div>
            </el-form>
        </div>
        <div class="footer">
            <el-button type="primary" define="enter" native-type="submit" :loading="loading" plain
                @click="btnEnter('form',true)">确认</el-button>
            <el-button type="primary" define="apply" native-type="submit" :loading="loading" plain v-if="exist"
                @click="btnEnter('form',false)">应用</el-button>
            <el-button type='close'>取消</el-button>
        </div>
    </div>
</body>

</html>
