<!DOCTYPE html>
<html lang="en">

<head resource>
    <meta charset="UTF-8">
    <include file="../inc/meta.inc" />
    <title>试题关键字</title>
</head>

<body>
    <div id="vapp" v-cloak>
        <div class="toolsbar">
            <btngroup show="新增,删除,全选/取消" ref='btngroup' :disabled="loading" @add="draweradd = true" @delete="btnbatdel"
                @select="selectall" width="960" height="80%"></btngroup>
            <query_panel :model="form" :loading="loading" @search="handleCurrentChange(1)">
                <el-form-item label="">
                    <el-input v-model="form.name" clearable style="width:160px" placeholder="搜索"
                        suffix-icon="el-icon-search"></el-input>
                </el-form-item>
            </query_panel>
        </div>
        <el-drawer :visible.sync="draweradd" direction="ttb" :show-close="false" size="300px" :before-close="()=>{}">
            <span slot="title" icon="&#xa02e">添加关键字</span>
            <el-form ref="formadd" :model="formadd" @submit.native.prevent :rules="formaddrules" label-width="80px">
                <el-form-item label="关键字" prop="Qtag_Name">
                    <el-input v-model.trim="formadd.Qtag_Name" placeholder="请输入标签名称" clearable :maxlength="1000">
                    </el-input>
                </el-form-item>
                <el-form-item>
                    <help>多个关键字，可以用逗号或空格分隔</help>
                </el-form-item>
                <el-form-item label="权重" prop="Qtag_Weight">
                    <el-slider v-model="formadd.Qtag_Weight" style="width: 600px;" :step="1" :min="1" :max="10"
                        show-stops show-input>
                    </el-slider>
                </el-form-item>
                <el-form-item>
                    <span class="el-icon-loading" v-if="loadstate.add"></span>
                    <template v-else>
                        <el-button type="primary" define="enter" native-type="submit" :loading="loadstate.add" plain
                            @click="btnadd()">
                            确定
                        </el-button>
                        <el-button type='info' @click="draweradd = false" plain>
                            <icon>&#xe72c</icon>取消
                        </el-button>
                    </template>
                </el-form-item>
            </el-form>
        </el-drawer>
        <section class="list-box">
            <el-card shadow="hover" v-for="(item,idx) in datas" :editing="item.editing">
                <template v-if="item.editing==null || item.editing==false">
                    <div slot="header">
                        <span>{{(form.index - 1) * form.size + idx+ 1}} . </span>
                        <el-tag type="primary"> {{item.Qtag_Name}}</el-tag>
                    </div>
                    <quescount :tag="item" :orgid="form.orgid"></quescount>
                    <div class="item_footer">
                        <el-checkbox v-model="item.checked">选中</el-checkbox>
                        <el-button-group>
                            <el-link type="primary" plain icon="el-icon-edit" @click="editstate(item,idx)">
                                修改
                            </el-link>
                            <el-popconfirm confirm-button-text='是的' cancel-button-text='不用' icon="el-icon-info"
                                icon-color="red" title="确定删除吗？" @confirm="btndel(item.Qtag_ID)">
                                <el-link type="danger" plain icon="el-icon-delete" slot="reference">删除
                                </el-link>
                            </el-popconfirm>
                        </el-button-group>
                    </div>
                </template>
                <template v-else>
                    <el-form :ref="'edit_'+idx" :model="item.clone" @submit.native.prevent :rules="editrules"
                        size="mini" label-width="50px">
                        <el-form-item label="名称" prop="Qtag_Name">
                            <el-input v-model.trim="item.clone.Qtag_Name" placeholder="请输入标签名称" clearable
                                :maxlength="1000">
                            </el-input>
                        </el-form-item>
                        <el-form-item label="权重" prop="Qtag_Weight">
                            <el-slider v-model="item.clone.Qtag_Weight" :step="1" :min="1" :max="10" show-stops>
                            </el-slider>
                        </el-form-item>
                    </el-form>
                    <div class="item_footer">
                        <span> </span>
                        <el-button-group>
                            <el-button type="primary" icon="el-icon-edit" plain :loading="item.loading"
                                @click="editsave('edit_'+idx,item)">保存</el-button>
                            <el-button type="info" plain @click="$set(item, 'editing', false)">取消</el-button>
                        </el-button-group>
                    </div>
                </template>
            </el-card>
        </section>
        <div id="pager-box">
            <el-pagination v-on:current-change="handleCurrentChange" :current-page="form.index" :page-size="form.size"
                :pager-count="12" layout="total, prev, pager, next, jumper" :total="total">
            </el-pagination>
        </div>
    </div>
</body>

</html>
