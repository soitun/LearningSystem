<!DOCTYPE html>
<html lang="zh">

<head resource>
    <meta charset="utf-8">
    <include file="../inc/meta.inc" />
    <title>导入试题</title>
</head>

<body>
    <div id="vapp" v-cloak>
        <div class="first">
            <header>
                <icon large>&#xe69f</icon>请选择要导入的试题类型、试题分类和知识点
                <loading v-if="loading">...</loading>
            </header>
            <el-tabs type="border-card">
                <el-tab-pane label="所属“试题分类”">
                    <selectpart :orgid="org.Org_ID" @update="updatepart"></selectpart>
                </el-tab-pane>
                <el-tab-pane label="关联“知识点”">
                    <selectknl :orgid="org.Org_ID" @update="updateknl"></selectknl>
                </el-tab-pane>
            </el-tabs>
            <div class="types">
                <span>题型：</span>
                <el-radio-group v-model="form.type">
                    <el-radio-button v-for="(item,i) in types" :label="i+1">
                        <ques_type :type="i+1" :types="types" :showname="true"></ques_type>
                    </el-radio-button>
                </el-radio-group>
            </div>
        </div>

        <div class="footer">
            <el-button type="primary" native-type="submit" :loading="loading" plain v-if="step>0" @click="step--">
                <icon>&#xe803</icon>上一步
            </el-button>
            <el-button type="primary" native-type="submit" :loading="loading" plain v-if="step<1" @click="step++">
                下一步 <icon>&#xe802</icon>
            </el-button>
            <el-button type='close'>取消</el-button>
        </div>
    </div>
</body>

</html>
