<!DOCTYPE html>
<html lang="zh">

<head resource>
    <include file="../inc/meta.inc" />
    <title>试题分类的编辑</title>
</head>

<body>
    <div id="vapp" v-cloak>
        <div class="panel">
            <el-tabs type="border-card" v-model="activeName">
                <el-tab-pane name="general">
                    <span slot="label">
                        <icon>&#xe6a4</icon> 基本信息
                    </span>
                </el-tab-pane>               
            </el-tabs>
            <el-form ref="entity" :model="entity" :rules="rules" @submit.native.prevent
                @keyup.native.enter="btnEnter('entity',false)" label-width="80px">
                <div v-show="activeName=='general'" remark="基本信息" tab="general">
                    <el-form-item label="名称" prop="Qp_Name">
                        <el-input v-model.trim="entity.Qp_Name"></el-input>
                    </el-form-item>
                    <el-form-item label="上级分类">
                        <el-cascader style="width: 100%;" v-model="selectedparts" :options="datas" separator="／"
                            :props="defaultProps" filterable>
                            <template slot-scope="{ node, data }">
                                <span class="serial">{{data.serial}}</span>
                                <span>{{ data.Qp_Name }}</span>
                            </template>
                        </el-cascader>
                    </el-form-item>
                    <el-form-item label="状态" prop="Qp_IsUse">
                        <el-switch v-model="entity.Qp_IsUse" :active-text="entity.Qp_IsUse ? '启用' : '禁用'"> </el-switch>
                    </el-form-item>
                    <el-form-item label="说明" prop="Qp_Intro">
                        <el-input type="textarea" :rows="6" placeholder="请输入内容" v-model="entity.Qp_Intro">
                        </el-input>
                    </el-form-item>
                </div>               
            </el-form>
        </div>
        <div class="footer">
            <el-button type="primary" define="enter" native-type="submit" :loading="loading" plain
                @click="btnEnter('entity',true)">
                保存
            </el-button>
            <el-button v-if="!isadd" type="primary" define="apply" native-type="submit" :loading="loading" plain
                @click="btnEnter('entity',false)">应用
            </el-button>
            <el-button type='close'>
                取消
            </el-button>
        </div>
    </div>


</body>

</html>
