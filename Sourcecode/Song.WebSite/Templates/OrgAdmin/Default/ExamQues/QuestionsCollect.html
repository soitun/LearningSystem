<!DOCTYPE html>
<html lang="en">

<head resource>
    <meta charset="UTF-8">
    <include file="../inc/meta.inc" />
    <title>试题收藏</title>
</head>

<body>
    <div id="vapp" v-cloak>
        <div class="toolsbar">
            <btngroup show="取消收藏,全选/取消" ref='btngroup' :disabled="loading" path="Modify" width="960" height="80%"
                @select="selectall" @cancel="cancelselected" idkey='Qus_ID' table="datatables"></btngroup>
            <query_panel :model="form" :width="45" :loading="loading" @search="handleCurrentChange(1)"
                @reset="queryreset">
                <template>
                    <el-form-item label="题干">
                        <el-input v-model.trim="form.search" clearable style="width:245px" placeholder="搜索题干">
                        </el-input>
                    </el-form-item>
                </template>
                <template slot="more">
                    <el-form-item label="题型">
                        <el-radio-group v-model="form.type" class="types">
                            <el-radio-button label="">
                                <icon ques_type="" title="所有" showname="true"></icon>
                            </el-radio-button>
                            <el-radio-button v-for="(item,i) in types" :label="i+1">
                                <ques_type :type="i+1" :types="types" :showname="true"></ques_type>
                            </el-radio-button>
                        </el-radio-group>
                    </el-form-item>
                    <el-form-item label="难度">
                        <el-radio-group v-model="form.diff">
                            <el-radio-button label="">所有</el-radio-button>
                            <el-radio-button v-for="(n,i) in ['很简单', '简单', '有难度', '比较难', '很难']" :label="i+1">
                                {{n}}
                            </el-radio-button>
                        </el-radio-group>
                    </el-form-item>
                    <el-form-item label="状态">
                        <!--是否试题有错误-->
                        <el-radio-group v-model="form.error">
                            <el-radio-button label="">所有</el-radio-button>
                            <el-radio-button label="false">
                                <icon>&#xe634</icon>正常
                            </el-radio-button>
                            <el-radio-button label="true">
                                <icon>&#xe70e</icon>存在错误
                            </el-radio-button>
                        </el-radio-group>
                    </el-form-item>
                    <el-form-item label="反馈">
                        <!--学员反馈有问题的试题-->
                        <el-radio-group v-model="form.wrong">
                            <el-radio-button label="">所有</el-radio-button>
                            <el-radio-button label="false">
                                <icon>&#xe634</icon>正常
                            </el-radio-button>
                            <el-radio-button label="true">
                                <icon>&#xe61f</icon>报错
                            </el-radio-button>
                        </el-radio-group>
                    </el-form-item>
                    <el-form-item label="启用">
                        <!--试题是否允许显示-->
                        <el-radio-group v-model="form.use">
                            <el-radio-button label="">所有</el-radio-button>
                            <el-radio-button label="true">
                                <icon>&#xa030</icon>启用
                            </el-radio-button>
                            <el-radio-button label="false">
                                <icon>&#xe7ad</icon>禁用
                            </el-radio-button>
                        </el-radio-group>
                    </el-form-item>
                    <el-form-item label="关键字">
                        <tagselect ref="tagselect" :org="org" @change="v=>form.tagid=v.join(',')"></tagselect>
                    </el-form-item>
                </template>
            </query_panel>
        </div>
        <!-- 数据列表-->
        <section class="data-list">
            <loading v-if="loading"></loading>
            <div v-else-if="datas.length<1" class="null">没有满足条件的数据</div>
            <div v-else class="datarow" v-for="(ques,index) in datas" :qid="item.Qus_ID">
                <div class="datarow-title">
                    <div class="index">{{(form.index - 1) * form.size + index + 1}}.</div>
                    <ques_type :type="ques.Qus_Type" :types="types" :showicon="true" :showname="true"></ques_type>
                    <ques_diff :ques="ques"></ques_diff>
                    <parts :ques="ques"></parts>
                    <div>
                        <span class="el-icon-loading" v-show="loadingid==ques.Qus_ID"></span>
                        <el-checkbox v-model="ques.checked">选中</el-checkbox>
                        <el-button-group>
                            <el-link type="primary" plain icon="el-icon-edit"
                                @click='$refs.btngroup.modify(scope.row.Qus_ID)'>
                                修改
                            </el-link>
                            <el-popconfirm confirm-button-text='是的' cancel-button-text='不用' icon="el-icon-info"
                                icon-color="red" title="确定删除吗？" @confirm="$refs.btngroup.delete(scope.row.Qus_ID)">
                                <el-link type="danger" plain icon="el-icon-delete" slot="reference">删除
                                </el-link>
                            </el-popconfirm>
                        </el-button-group>
                    </div>
                </div>
                <div class="datarow-content" @click="$set(ques,'showdetail',!ques.showdetail)"
                    :showdetail="ques.showdetail">
                    <span v-html="showsearch(ques.Qus_Title,form.search)"></span>
                    <div v-if="ques.Qus_Type==1 || ques.Qus_Type==2" class="qus_items" remark="单选、多选的选项">
                        <div v-for="(item,index) in ques.Qus_Items" :correct="item.Ans_IsCorrect"
                            v-html="String.fromCharCode(65 + index) +'.'+item.Ans_Context">
                        </div>
                    </div>
                    <answer :ques="ques"></answer>
                </div>
                <div class="datarow-footer">
                    <tags :ques="ques"></tags>
                    <ques_collect :ques="ques" :accid="admin.Acc_Id"></ques_collect>
                </div>
            </div>
        </section>

        <div id="pager-box">
            <el-pagination v-on:current-change="handleCurrentChange" :current-page="form.index" :page-size="form.size"
                :pager-count="12" layout="total, prev, pager, next, jumper" :total="total">
            </el-pagination>
        </div>
    </div>
</body>

</html>
