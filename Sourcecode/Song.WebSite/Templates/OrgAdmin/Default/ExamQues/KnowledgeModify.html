<!DOCTYPE html>
<html lang="zh">

<head resource>
    <include file="../inc/meta.inc" />
    <title>试题知识点的编辑</title>
</head>

<body>
    <div id="vapp" v-cloak>
        <div class="panel">
            <el-tabs type="border-card" v-model="activeName">
                <el-tab-pane name="general">
                    <span slot="label">
                        <icon>&#xe6a4</icon> 基本信息
                    </span>
                </el-tab-pane>              
                <el-tab-pane name="detail">
                    <span slot="label">
                        <icon>&#xe72f</icon> 详情
                    </span>
                </el-tab-pane>
            </el-tabs>
            <el-form ref="entity" :model="entity" :rules="rules" @submit.native.prevent
                @keyup.native.enter="btnEnter('entity',false)" label-width="80px">
                <div v-show="activeName=='general'" remark="基本信息" tab="general">
                    <el-form-item label="名称" prop="Qk_Name">
                        <el-input v-model.trim="entity.Qk_Name"></el-input>
                    </el-form-item>
                    <el-form-item label="别名" prop="Qk_ByName">
                        <el-input v-model="entity.Qk_ByName"></el-input>
                    </el-form-item>
                    <el-form-item label="上级节点">
                        <el-cascader style="width: 100%;" v-model="selects " :options="datas" separator="／"
                            :props="defaultProps" filterable>
                            <template slot-scope="{ node, data }">
                                <span class="serial">{{data.serial}}</span>
                                <span>{{ data.Qk_Name }}</span>                                  
                              </template>
                        </el-cascader>

                    </el-form-item>
                    <el-form-item label="状态" prop="Qk_IsUse">
                        <el-switch v-model="entity.Qk_IsUse" :active-text="entity.Qk_IsUse ? '启用' : '禁用'">
                        </el-switch>
                        <el-switch v-model="entity.Qk_IsRec" :active-text="entity.Qk_IsRec ? '推荐' : '未推荐'">
                        </el-switch>
                    </el-form-item>
                    <el-form-item label="说明" prop="Qk_Intro">
                        <el-input type="textarea" :rows="6" placeholder="请输入内容" v-model="entity.Qk_Intro">
                        </el-input>
                    </el-form-item>
                </div>

                <div v-show="activeName=='detail'" class="about_editor" tab="detail" remark="详情">
                    <editor ref="editor" :content="entity.Qk_Details" :menubar="false" model="mini" upload="Subject"
                        :dataid="entity.Qk_ID" @change="text=>entity.Qk_Details=text"></editor>
                </div>
            </el-form>
        </div>
        <div class="footer">
            <el-button type="primary" define="enter" native-type="submit" :loading="loading" plain
                @click="btnEnter('entity',true)">
                保存
            </el-button>
            <el-button v-if="!isadd" type="primary" define="apply" native-type="submit" :loading="loading" plain
                @click="btnEnter('entity',false)">应用
            </el-button>
            <el-button type='close'>
                取消
            </el-button>
        </div>
    </div>


</body>

</html>
