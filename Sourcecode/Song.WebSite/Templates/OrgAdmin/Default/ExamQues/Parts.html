<!DOCTYPE html>
<html lang="en">
<head resource>
    <meta charset="UTF-8">
    <include file="../inc/meta.inc" /> 
    <title></title>
</head>
<body>
    <div id="vapp" v-cloak> 
        <div class="toolsbar">
            <btngroup show="新增,更新数据,展开/折叠" ref='btngroup' path="PartModify" @update_data="update_statdata"
                @fold_open="fold=!fold" width="800" idkey='Qp_ID' height="500"></btngroup>
            <query_panel :model="form" :loading="loading">
                <el-form-item label="">
                    <el-tag type="success">
                        <icon>&#xe750</icon>总计 {{total}} 个分类
                    </el-tag>
                </el-form-item>
                <el-form-item label="">
                    <el-input v-model="filterText" clearable style="width:160px" placeholder="搜索"
                        suffix-icon="el-icon-search"></el-input>
                </el-form-item>
            </query_panel>

        </div>
        <div class="tree-box">
            <el-tree ref="tree" :data="datas" node-key="Qp_ID" ref="tree" :props="defaultProps" expand-on-click-node
                :filter-node-method="filterNode" @node-drag-end="handleDragEnd" :expand-on-click-node="false" draggable
                @node-expand="nodeexpand" @node-collapse="nodecollapse" :default-expanded-keys="expanded"
                v-loading="loading || loading_sumbit">
                <div class="custom-tree-node" slot-scope="{ node, data }">
                    <span class="tree-node draghandle">
                        <span>{{data.serial}}</span> &nbsp;   
                        <span class="large" v-html="showsearch(data.Qp_Name,filterText)"></span>
                        <span class="sbjcount" v-if="data.calcChild>0">({{data.calcChild}})</span>
                    </span>                 
                    <div class="column_state">
                        <b class="el-icon-loading" v-if="loadingid==data.Qp_ID"></b>
                        <template v-else>
                            <el-tag :type="data.Qp_IsUse ? 'success' : 'info'" @click="changeState(data,'Qp_IsUse')">
                                {{data.Qp_IsUse ? '启用' : '禁用'}}</el-tag>                          
                        </template>
                    </div>

                    <div class="column_btn">
                        <el-link type="primary" size="mini" icon="el-icon-edit" @click="modify(data)">
                            编辑
                        </el-link>
                        <el-popconfirm title="确定删除吗？" @confirm="remove(node, data)">
                            <el-link type="danger" icon="el-icon-delete" slot="reference">
                                删除
                            </el-link>
                        </el-popconfirm>
                    </div>
                </div>

            </el-tree>
        </div>
    </div> 
</body>
</html>
